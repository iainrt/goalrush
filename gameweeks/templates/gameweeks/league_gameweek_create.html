{% extends "base.html" %}
{% block title %}Create gameweek{% endblock %}
{% block content %}
  <h1>Create gameweek</h1>
  <p class="muted">{{ league.name }} · {{ league.season.name }}</p>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Create gameweek</button>
    </form>
  </div>
{% endblock %}
