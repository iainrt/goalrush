<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}GoalRush{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      .topbar { height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid #eee; }
      .layout { display:flex; min-height: calc(100vh - 56px); }
      .sidebar { width:220px; border-right:1px solid #eee; padding:12px; }
      .content { flex:1; padding:16px; }
      .nav a { display:block; padding:8px 10px; border-radius:8px; text-decoration:none; color:#111; }
      .nav a:hover { background:#f5f5f5; }
      .card { border:1px solid #eee; border-radius:12px; padding:12px; margin-bottom:12px; }
      .muted { color:#666; font-size: 0.9rem; }
      .row { display:flex; gap:12px; flex-wrap:wrap; }
      .btn { display:inline-block; padding:8px 12px; border-radius:10px; border:1px solid #ddd; text-decoration:none; color:#111; }
      .btn:hover { background:#f7f7f7; }
      .messages { margin: 12px 0; }
      .msg { padding:10px 12px; border-radius:10px; margin-bottom:8px; background:#f5f5f5; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div><strong>GoalRush</strong></div>
      <div>
        {% if user.is_authenticated %}
          <a class="btn" href="/admin/">Admin</a>
          <a class="btn" href="/users/profile/">{{ user.username }}</a>
        {% else %}
          <a class="btn" href="/users/login/">Login</a>
        {% endif %}
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <nav class="nav">
          <a href="/leagues/">Leagues</a>
          <a href="/leagues/create/">Create league</a>
          <a href="/leagues/join/">Join league</a>
        </nav>
      </aside>

      <main class="content">
        {% if messages %}
          <div class="messages">
            {% for message in messages %}
              <div class="msg">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}

        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
